<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convertidor Multimedia Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/coi-serviceworker@0.1.7/dist/coi-serviceworker.min.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.12.7/dist/umd/ffmpeg.umd.js"></script>
    <script src="https://unpkg.com/@ffmpeg/util@0.12.1/dist/umd/index.js"></script>

    <style>
        :root { --primary: #2563eb; --bg: #f1f5f9; --success: #16a34a; --error: #dc2626; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); padding: 20px; color: #1e293b; }
        .container { max-width: 800px; margin: 0 auto; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #0f172a; margin-bottom: 2rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem; }
        .tool-section { padding: 1.2rem; border: 1px solid #e2e8f0; border-radius: 8px; background: #fff; }
        .tool-section h3 { margin: 0 0 1rem 0; font-size: 1rem; color: #334155; border-bottom: 2px solid #f1f5f9; padding-bottom: 5px; }
        input[type="file"] { width: 100%; margin-bottom: 10px; font-size: 0.8rem; }
        button { background: var(--primary); color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: 600; transition: opacity 0.2s; }
        button:disabled { background: #94a3b8; cursor: not-allowed; }
        .status { margin-top: 8px; font-size: 0.8rem; text-align: center; min-height: 1.2rem; }
        #log-container { margin-top: 20px; background: #000; color: #00ff00; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 12px; max-height: 150px; overflow-y: auto; display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1>Multimedia Converter 🔄</h1>
        
        <div class="grid">
            <div class="tool-section">
                <h3>🖼️ Imagen (JPG ↔ PNG)</h3>
                <input type="file" id="imgInput" accept="image/png, image/jpeg">
                <div style="display: flex; gap: 5px;">
                    <button onclick="convertImage('image/jpeg', 'jpg')">A JPG</button>
                    <button onclick="convertImage('image/png', 'png')">A PNG</button>
                </div>
                <div id="imgStatus" class="status"></div>
            </div>

            <div class="tool-section">
                <h3>🎵 MP3 a MP4 (Video con Audio)</h3>
                <input type="file" id="mp3Input" accept="audio/mpeg">
                <button id="btnMp3" onclick="convertMp3ToMp4()">Convertir a MP4</button>
                <div id="mp3Status" class="status"></div>
            </div>

            <div class="tool-section">
                <h3>🎬 MP4 a PDF (Fotogramas)</h3>
                <input type="file" id="mp4Input" accept="video/mp4">
                <button id="btnMp4Pdf" onclick="convertMp4ToPdf()">Extraer a PDF</button>
                <div id="mp4Status" class="status"></div>
            </div>

            <div class="tool-section">
                <h3>📄 PDF a MP4 (Presentación)</h3>
                <input type="file" id="pdfInput" accept="application/pdf">
                <button id="btnPdf" onclick="convertPdfToMp4()">Generar Video</button>
                <div id="pdfStatus" class="status"></div>
            </div>
        </div>

        <div id="log-container"><strong>Consola de Procesamiento:</strong><div id="log"></div></div>
    </div>
</div>

<canvas id="hiddenCanvas" style="display:none;"></canvas>

<script>
    const { FFmpeg } = FFmpegWASM;
    const { fetchFile } = FFmpegUtil;
    let ffmpeg = null;

    // Helper para logs
    function updateLog(msg) {
        const log = document.getElementById('log');
        const container = document.getElementById('log-container');
        container.style.display = 'block';
        log.innerHTML += `<div>> ${msg}</div>`;
        log.parentElement.scrollTop = log.parentElement.scrollHeight;
    }

    // --- 1. CONVERSIÓN DE IMÁGENES (JPG/PNG) ---
    async function convertImage(format, ext) {
        const input = document.getElementById('imgInput');
        const status = document.getElementById('imgStatus');
        if (!input.files[0]) return alert("Selecciona una imagen");

        const file = input.files[0];
        const reader = new FileReader();
        
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.getElementById('hiddenCanvas');
                const ctx = canvas.getContext('2d');
                canvas.width = img.width;
                canvas.height = img.height;
                
                if (ext === 'jpg') {
                    ctx.fillStyle = "#FFFFFF";
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                }
                
                ctx.drawImage(img, 0, 0);
                const dataUrl = canvas.toDataURL(format, 0.9);
                downloadFile(dataUrl, `convertido.${ext}`);
                status.innerText = "¡Imagen convertida!";
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    // --- 2. MP3 A MP4 ---
    async function convertMp3ToMp4() {
        const input = document.getElementById('mp3Input');
        const btn = document.getElementById('btnMp3');
        if (!input.files[0]) return alert("Selecciona un MP3");

        btn.disabled = true;
        await initFFmpeg();
        
        const file = input.files[0];
        await ffmpeg.writeFile('audio.mp3', await fetchFile(file));
        
        // Comando: Crea video negro con el audio de fondo
        await ffmpeg.exec([
            '-f', 'lavfi', '-i', 'color=c=black:s=1280x720:d=5', // fallback duración si falla
            '-i', 'audio.mp3',
            '-c:v', 'libx264', '-tune', 'stillimage', '-c:a', 'aac', '-b:a', '192k', '-pix_fmt', 'yuv420p', '-shortest', 'output.mp4'
        ]);

        const data = await ffmpeg.readFile('output.mp4');
        downloadFile(URL.createObjectURL(new Blob([data.buffer], { type: 'video/mp4' })), 'audio_video.mp4');
        btn.disabled = false;
    }

    // --- 3. MP4 A PDF ---
    async function convertMp4ToPdf() {
        const input = document.getElementById('mp4Input');
        if (!input.files[0]) return alert("Selecciona un video");
        
        updateLog("Iniciando extracción de fotogramas...");
        await initFFmpeg();
        await ffmpeg.writeFile('input.mp4', await fetchFile(input.files[0]));

        // Extraer 1 frame por segundo
        await ffmpeg.exec(['-i', 'input.mp4', '-vf', 'fps=1', 'out%d.jpg']);
        
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF();
        
        // Leer archivos generados (limitado a los primeros 20 para no colapsar el navegador)
        for(let i = 1; i <= 20; i++) {
            try {
                const name = `out${i}.jpg`;
                const data = await ffmpeg.readFile(name);
                const base64 = btoa(String.fromCharCode(...new Uint8Array(data)));
                if(i > 1) pdf.addPage();
                pdf.addImage(`data:image/jpeg;base64,${base64}`, 'JPEG', 10, 10, 190, 110);
                updateLog(`Agregando página ${i} al PDF...`);
            } catch(e) { break; }
        }
        
        pdf.save("video_capturas.pdf");
    }

    // --- 4. PDF A MP4 (Tu lógica mejorada) ---
    async function convertPdfToMp4() {
        const input = document.getElementById('pdfInput');
        if (!input.files[0]) return alert("Selecciona un PDF");

        await initFFmpeg();
        const arrayBuffer = await input.files[0].arrayBuffer();
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        
        const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
        for (let i = 1; i <= pdf.numPages; i++) {
            const page = await pdf.getPage(i);
            const viewport = page.getViewport({ scale: 1.5 });
            const canvas = document.getElementById('hiddenCanvas');
            const ctx = canvas.getContext('2d');
            canvas.height = viewport.height;
            canvas.width = viewport.width;
            await page.render({ canvasContext: ctx, viewport }).promise;
            
            const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.8));
            await ffmpeg.writeFile(`p${i}.jpg`, await fetchFile(blob));
            updateLog(`Renderizando página ${i}...`);
        }

        await ffmpeg.exec([
            '-framerate', '1/3', 
            '-i', 'p%d.jpg', 
            '-c:v', 'libx264', '-r', '30', '-pix_fmt', 'yuv420p', '-vf', 'pad=ceil(iw/2)*2:ceil(ih/2)*2', 'pdf_video.mp4'
        ]);

        const data = await ffmpeg.readFile('pdf_video.mp4');
        downloadFile(URL.createObjectURL(new Blob([data.buffer], { type: 'video/mp4' })), 'presentacion.mp4');
    }

    // INICIALIZADOR DE FFMPEG
    async function initFFmpeg() {
        if (ffmpeg) return;
        ffmpeg = new FFmpeg();
        ffmpeg.on('log', ({ message }) => updateLog(message));
        await ffmpeg.load({
            coreURL: 'https://unpkg.com/@ffmpeg/core@0.12.6/dist/umd/ffmpeg-core.js',
        });
    }

    function downloadFile(url, name) {
        const a = document.createElement('a');
        a.href = url;
        a.download = name;
        a.click();
    }
</script>

</body>
</html>
